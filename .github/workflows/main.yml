# Nombre del workflow que aparecerá en la interfaz de GitHub Actions
name: Build and Deploy SigmaWeb en AWS (ec2)

# Define cuándo se ejecutará este workflow
on:
  push:
    branches: [ "master" ]  # Se activa con push a la rama main
  pull_request:
    branches: [ "master" ]  # Opcional: también en PRs a main

# Permite ejecuciones manuales desde la interfaz de GitHub
workflow_dispatch:
 

# Conjunto de jobs que componen este workflow
jobs:
  # Job de construcción y testeo
  build:
    # Se ejecuta en una máquina virtual Ubuntu
    runs-on: ubuntu-latest
    
    # Pasos que componen este job
    steps:
      # Paso 1: Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4
        # Acción oficial de GitHub para descargar el código
        
      # Paso 2: Configurar JDK (Java Development Kit)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          # Usamos Java 17 (compatible con Spring Boot 3+)
          # Temurin es una distribución OpenJDK
          
      # Paso 3: Cachear dependencias de Maven para acelerar builds futuros
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-
            
      # Paso 4: Compilar y testear con Maven
      - name: Build with Maven
        run: mvn -B package --file pom.xml
        # -B: modo batch (no interactivo)
        # package: compila, testea y empaqueta
        
      # Paso 5: Guardar el artefacto (JAR) para el job de despliegue
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: spring-boot-app
          path: target/*.jar
          # Sube el JAR generado para usarlo en el despliegue

  # Job de despliegue en EC2
  deploy:
    # Depende del job build (solo se ejecuta si build fue exitoso)
    needs: build
    
    runs-on: ubuntu-latest
    
    steps:
      # Paso 1: Descargar el artefacto (JAR) del job build
      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: spring-boot-app
          
      # Paso 2: Configurar credenciales AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          # Usa secrets de GitHub (configurados en la interfaz del repo)
          
      # Paso 3: Copiar el JAR a la instancia EC2 usando SSH
      - name: Copy JAR to EC2 via SSH
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "*.jar"
          target: "/home/ubuntu/app/"
          # Copia el JAR al directorio /home/ubuntu/app/ en la EC2
          
      # Paso 4: Reiniciar la aplicación en EC2 via SSH
      - name: Restart Spring Boot application
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            # Busca y mata el proceso Java existente
            pkill -f 'java -jar' || true
            # Mueve el JAR a su ubicación final
            mv /home/ubuntu/app/*.jar /home/ubuntu/app/application.jar
            # Inicia la nueva versión
            nohup java -jar /home/ubuntu/app/application.jar \
              --spring.datasource.url=jdbc:mysql://${{ secrets.RDS_ENDPOINT }}:3306/${{ secrets.RDS_DB_NAME }} \
              --spring.datasource.username=${{ secrets.RDS_USERNAME }} \
              --spring.datasource.password=${{ secrets.RDS_PASSWORD }} \
              > /home/ubuntu/app/logs/app.log 2>&1 &
            # Nota: Asume que MySQL es tu RDS. Ajusta según tu DB
