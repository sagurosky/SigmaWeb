name: Build and Deploy SigmaWeb en AWS (ec2)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build with Maven
        run: |
          mvn clean test
          mvn package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-app
          path: target/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-app

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Copy JAR to EC2 via SSH
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "*.jar"
          target: "/home/ubuntu/app/"

      - name: Prepare and restart application on EC2
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            # 1. Detener aplicación existente
            echo "Deteniendo aplicación existente..."
            sudo pkill -f 'java -jar' || true
            
            # 2. Esperar para asegurar que el proceso se detuvo
            sleep 5
            
            # 3. Mover el nuevo JAR
            echo "Moviendo archivo JAR..."
            sudo mv /home/ubuntu/app/*.jar /home/ubuntu/app/application.jar
            
            # 4. Crear directorio de logs si no existe
            echo "Creando directorio de logs..."
            sudo mkdir -p /home/ubuntu/app/logs
            
            # 5. Configurar permisos
            echo "Configurando permisos..."
            sudo chown -R ubuntu:ubuntu /home/ubuntu/app
            sudo chmod 500 /home/ubuntu/app/application.jar
            
            # 6. Configurar variables de entorno para la conexión RDS
            # (Se conectará directamente desde la EC2 al RDS)
            echo "Iniciando aplicación..."
            nohup java -jar /home/ubuntu/app/application.jar \
              --spring.datasource.url=jdbc:mysql://${{ secrets.RDS_ENDPOINT }}:3306/${{ secrets.RDS_DB_NAME }}?useSSL=false \
              --spring.datasource.username=${{ secrets.RDS_USERNAME }} \
              --spring.datasource.password=${{ secrets.RDS_PASSWORD }} \
              --server.port=8080 \
              > /home/ubuntu/app/logs/app.log 2>&1 &
            
            # 7. Verificar que la aplicación se inició
            echo "Verificando estado de la aplicación..."
            sleep 10
            pgrep -f 'java -jar' || echo "Error: La aplicación no se inició correctamente"