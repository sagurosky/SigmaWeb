name: Build and Deploy SigmaWeb en AWS (ec2)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build with Maven
        run: mvn clean package -DskipTests


      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-app
          path: target/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-app

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Copy JAR to EC2 via SSH
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "*.jar"
          target: "/home/ubuntu/app/"

      - name: Prepare and restart application on EC2
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            # 1. Detener servicio existente
            echo "Deteniendo servicio sigmaweb..."
            sudo systemctl stop sigmaweb || true
            sleep 3  # Esperar para asegurar que se detuvo
            
            # 2. Copiar el nuevo JAR (CORRECCIÓN IMPORTANTE)
            echo "Copiando nuevo archivo JAR..."
            sudo cp -v *.jar /home/ubuntu/gestortareas-1.0.jar  # Ruta completa explícita
            sudo chown ubuntu:ubuntu /home/ubuntu/gestortareas-1.0.jar
            sudo chmod 500 /home/ubuntu/gestortareas-1.0.jar
            
            # 3. Reiniciar el servicio
            echo "Reiniciando servicio sigmaweb..."
            sudo systemctl daemon-reload
            sudo systemctl restart sigmaweb
            
            # 4. Verificar estado y logs
            echo "Verificando estado del servicio..."
            sleep 10  # Más tiempo para que la app inicie
            sudo systemctl status sigmaweb --no-pager
            journalctl -u sigmaweb -n 50 --no-pager  # Ver logs detallados